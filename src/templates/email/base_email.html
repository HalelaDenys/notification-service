<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
  <title>{% block title %}{% endblock %}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style type="text/css">
    /* Reset */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; border-collapse: collapse; }
    img { border: 0; line-height: 100%; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; }
    /* Mobile */
    @media only screen and (max-width: 620px) {
      .email-card { width: 100% !important; border-radius: 0 !important; border-left: none !important; border-right: none !important; }
      .email-padding { padding-left: 24px !important; padding-right: 24px !important; }
      .email-wrapper { padding: 0 !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f1f5f9; font-family: Arial, Helvetica, sans-serif;">

  {% block preheader %}{% endblock %}

  <!-- Outer background -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
    style="background-color: #f1f5f9; width: 100%;">
    <tr>
      <td align="center" class="email-wrapper" style="padding: 40px 16px;">

        <!-- Card -->
        <table role="presentation" cellpadding="0" cellspacing="0" border="0"
          class="email-card"
          style="width: 600px; max-width: 600px; background-color: #ffffff; border-radius: 8px; border: 1px solid #e2e8f0;">

          {% block content %}{% endblock %}

          <!-- Universal footer -->
          <tr>
            <td class="email-padding"
              style="padding: 0 40px 28px 40px; font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #cbd5e1; text-align: center; line-height: 1.6;">
              {% block footer %}
              You received this email because you have an account with us.<br>
              {% block unsubscribe %}{% endblock %}
              {% endblock %}
            </td>
          </tr>

        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>

</body>
</html>
